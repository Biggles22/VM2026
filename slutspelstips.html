<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slutspelstips - VM Tips 2026</title>
  <style>
    :root {
      color: #14253f;
      background: #f3f7fb;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      --ink: #14253f;
      --muted: #5a6b82;
      --line: rgba(20, 37, 63, 0.1);
      --blue: #24547a;
      --green: #187457;
      --coral: #b24a3f;
      --gold: #a96f14;
      --paper: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(91, 150, 198, 0.22), transparent 34rem),
        linear-gradient(180deg, #f8fbff 0%, #edf4f8 54%, #ffffff 100%);
      color: var(--ink);
    }

    .page {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      padding: 26px 0 22px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 4.4rem);
      line-height: 0.96;
      letter-spacing: 0;
      color: #10223c;
    }

    .lead {
      margin: 14px 0 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.65;
      font-size: 1rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      min-height: 34px;
      padding: 7px 12px;
      border: 1px solid rgba(24, 116, 87, 0.18);
      background: rgba(24, 116, 87, 0.1);
      color: var(--green);
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin: 22px 0;
    }

    .metric {
      min-height: 112px;
      padding: 18px;
      border-radius: 8px;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: 0 18px 46px rgba(35, 54, 86, 0.07);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .metric strong {
      display: block;
      margin-top: 10px;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      line-height: 1;
      color: #10223c;
    }

    .champion-board {
      margin: 22px 0;
      padding: 18px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 18px 46px rgba(35, 54, 86, 0.07);
    }

    .champion-board h2 {
      margin: 0 0 14px;
      color: #10223c;
      font-size: 1.2rem;
      letter-spacing: 0;
    }

    .champion-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .champion-list li {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 46px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(36, 84, 122, 0.06);
      border: 1px solid rgba(36, 84, 122, 0.08);
    }

    .champion-rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: rgba(169, 111, 20, 0.12);
      color: var(--gold);
      font-weight: 900;
    }

    .champion-name {
      min-width: 0;
      overflow-wrap: anywhere;
      font-weight: 800;
      color: #10223c;
    }

    .champion-votes {
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      margin: 22px 0 18px;
    }

    .search,
    select {
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font: inherit;
      box-shadow: 0 10px 26px rgba(35, 54, 86, 0.05);
    }

    .search {
      width: 100%;
      padding: 11px 14px;
      outline: none;
    }

    .search:focus {
      border-color: rgba(36, 84, 122, 0.45);
      box-shadow: 0 0 0 4px rgba(36, 84, 122, 0.12);
    }

    select {
      padding: 9px 36px 9px 12px;
    }

    .segmented {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(92px, 1fr));
      min-height: 44px;
      padding: 4px;
      border-radius: 8px;
      background: rgba(20, 37, 63, 0.08);
      border: 1px solid rgba(20, 37, 63, 0.08);
    }

    button {
      min-height: 36px;
      border: 0;
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--ink);
      background: transparent;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button[aria-pressed="true"] {
      background: #fff;
      color: var(--blue);
      box-shadow: 0 6px 18px rgba(20, 37, 63, 0.12);
    }

    .content {
      min-height: 320px;
    }

    .participant-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .participant {
      overflow: hidden;
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 18px 46px rgba(35, 54, 86, 0.07);
    }

    .participant-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      padding: 16px 18px;
      background: linear-gradient(90deg, #173655, #24547a);
      color: #fff;
    }

    .participant-head h2 {
      margin: 0;
      font-size: 1.18rem;
      letter-spacing: 0;
    }

    .complete,
    .missing {
      flex: 0 0 auto;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
    }

    .complete {
      background: rgba(222, 247, 235, 0.18);
      color: #dff8ed;
    }

    .missing {
      background: rgba(255, 225, 220, 0.18);
      color: #ffe5df;
    }

    .stage-block {
      border-top: 1px solid rgba(20, 37, 63, 0.08);
    }

    .stage-title {
      margin: 0;
      padding: 12px 16px 8px;
      color: var(--blue);
      font-size: 0.92rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .tips-list {
      display: grid;
      gap: 0;
    }

    .tip-row {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 12px;
      padding: 10px 16px;
      border-top: 1px solid rgba(20, 37, 63, 0.08);
      align-items: center;
    }

    .tip-row:first-child {
      border-top: 0;
    }

    .round-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      height: 32px;
      padding: 0 8px;
      border-radius: 8px;
      background: rgba(36, 84, 122, 0.1);
      color: var(--blue);
      font-weight: 800;
      font-size: 0.82rem;
    }

    .pick {
      min-width: 0;
      font-weight: 700;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .empty {
      color: #9aa7b6;
      font-style: italic;
      font-weight: 600;
    }

    .final-picks {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0;
      border-top: 1px solid rgba(20, 37, 63, 0.08);
    }

    .final-pick {
      min-height: 76px;
      padding: 14px 16px;
      border-left: 1px solid rgba(20, 37, 63, 0.08);
    }

    .final-pick:first-child {
      border-left: 0;
    }

    .final-pick span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .final-pick strong {
      display: block;
      margin-top: 6px;
      color: #10223c;
      font-size: 1rem;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .round-table-wrap {
      overflow-x: auto;
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 18px 46px rgba(35, 54, 86, 0.07);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 780px;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(20, 37, 63, 0.08);
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #173655;
      color: #fff;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: rgba(36, 84, 122, 0.04);
    }

    .name-cell {
      width: 150px;
      font-weight: 800;
      color: #10223c;
      white-space: nowrap;
    }

    .notice {
      padding: 22px;
      border-radius: 8px;
      background: #fff;
      border: 1px dashed rgba(36, 84, 122, 0.28);
      color: var(--muted);
      line-height: 1.6;
    }

    @media (max-width: 820px) {
      header,
      .toolbar {
        grid-template-columns: 1fr;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .segmented {
        width: 100%;
      }
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 20px, 1280px);
        padding-top: 18px;
      }

      .summary,
      .final-picks {
        grid-template-columns: 1fr;
      }

      .final-pick {
        border-left: 0;
        border-top: 1px solid rgba(20, 37, 63, 0.08);
      }

      .final-pick:first-child {
        border-top: 0;
      }

      .participant-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>Slutspelstips</h1>
        <p class="lead">Alla tippade lag genom slutspelet, från åttondelsfinalerna till världsmästare, brons, skyttekung och utslagsfråga.</p>
      </div>
      <div class="badge" id="statusBadge">Laddar tips...</div>
    </header>

    <section class="summary" aria-label="Sammanfattning">
      <div class="metric">
        <span>Deltagare</span>
        <strong id="participantCount">0</strong>
      </div>
      <div class="metric">
        <span>Kompletta tips</span>
        <strong id="completeCount">0</strong>
      </div>
      
      <div class="metric">
        <span>Mästare</span>
        <strong id="championCount">0</strong>
      </div>
    </section>

    <section class="champion-board" aria-label="Topp 5 tippade världsmästare">
      <h2>Topp 5 tippade världsmästare</h2>
      <ol class="champion-list" id="championTopList">
        <li>
          <span class="champion-rank">1</span>
          <span class="champion-name empty">Laddar...</span>
          <span class="champion-votes">0 tips</span>
        </li>
      </ol>
    </section>

    <section class="champion-board" aria-label="Topp 5 tippade skyttekungar">
      <h2>Topp 5 tippade skyttekungar</h2>
      <ol class="champion-list" id="scorerTopList">
        <li>
          <span class="champion-rank">1</span>
          <span class="champion-name empty">Laddar...</span>
          <span class="champion-votes">0 tips</span>
        </li>
      </ol>
    </section>

    <section class="toolbar" aria-label="Filter">
      <input class="search" id="searchInput" type="search" placeholder="Sök deltagare, lag eller skyttekung">
      <div class="segmented" aria-label="Vy">
        <button type="button" id="participantView" aria-pressed="true">Deltagare</button>
        <button type="button" id="roundView" aria-pressed="false">Omgångar</button>
      </div>
      <select id="stageFilter" aria-label="Välj omgång">
        <option value="">Alla omgångar</option>
      </select>
    </section>

    <section class="content" id="content" aria-live="polite"></section>
  </main>

  <script>
    const STAGES = [
      { key: "r16", title: "Åttondelsfinaler", start: 1, count: 16, label: index => `ÅF ${index + 1}` },
      { key: "qf", title: "Kvartsfinaler", start: 17, count: 8, label: index => `Kvart ${index + 1}` },
      { key: "sf", title: "Semifinaler", start: 25, count: 4, label: index => `Semi ${index + 1}` },
      { key: "final", title: "Final", start: 29, count: 2, label: index => `Final ${index + 1}` },
      { key: "extra", title: "Extra tips", start: 31, count: 4, label: index => ["Världsmästare", "Brons", "Skyttekung", "Utslagsfråga"][index] }
    ];

    const state = {
      participants: [],
      headers: [],
      view: "participants",
      query: "",
      stage: ""
    };

    const els = {
      statusBadge: document.getElementById("statusBadge"),
      participantCount: document.getElementById("participantCount"),
      completeCount: document.getElementById("completeCount"),
      filledCount: document.getElementById("filledCount"),
      championCount: document.getElementById("championCount"),
      championTopList: document.getElementById("championTopList"),
      scorerTopList: document.getElementById("scorerTopList"),
      searchInput: document.getElementById("searchInput"),
      participantView: document.getElementById("participantView"),
      roundView: document.getElementById("roundView"),
      stageFilter: document.getElementById("stageFilter"),
      content: document.getElementById("content")
    };

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function getStageItems(stage) {
      return Array.from({ length: stage.count }, (_, index) => ({
        key: `${stage.key}-${index}`,
        label: stage.label(index),
        valueIndex: stage.start + index
      }));
    }

    function parseTips(text) {
      const lines = text.split(/\r?\n/).filter(line => line.trim());
      const headers = (lines.shift() || "").split("\t").map(cell => cell.trim());
      const participants = lines.map(line => {
        const cells = line.split("\t").map(cell => cell.trim());
        return {
          name: cells[0] || "",
          values: headers.slice(1).map((header, index) => ({
            header,
            value: cells[index + 1] || ""
          }))
        };
      }).filter(participant => participant.name);

      return { headers, participants };
    }

    function getStageByKey(key) {
      return STAGES.find(stage => stage.key === key);
    }

    function selectedStages() {
      return state.stage ? [getStageByKey(state.stage)].filter(Boolean) : STAGES;
    }

    function filledValues(participant) {
      return participant.values.filter(item => item.value).length;
    }

    function matchesSearch(participant) {
      const query = state.query.toLowerCase();
      if (!query) return true;
      return participant.name.toLowerCase().includes(query) || participant.values.some(item =>
        item.value.toLowerCase().includes(query)
      );
    }

    function getVisibleParticipants() {
      return state.participants.filter(matchesSearch);
    }

    function cleanText(value) {
      return String(value || "")
        .replace(/Ã©/g, "é")
        .replace(/Ã«/g, "ë")
        .replace(/Ã¡/g, "á")
        .replace(/Ã¶/g, "ö")
        .replace(/Ã¥/g, "å")
        .replace(/Ã¤/g, "ä")
        .trim();
    }

    function normalizeName(value) {
      return cleanText(value)
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/\s+/g, " ");
    }

    function getRanking(valueIndex, aliases = {}) {
      const counts = new Map();
      state.participants.forEach(participant => {
        const rawValue = participant.values[valueIndex]?.value;
        if (!rawValue) return;
        const normalized = normalizeName(rawValue);
        const displayName = aliases[normalized] || cleanText(rawValue);
        counts.set(displayName, (counts.get(displayName) || 0) + 1);
      });

      return [...counts.entries()]
        .map(([name, votes]) => ({ name, votes }))
        .sort((a, b) => b.votes - a.votes || a.name.localeCompare(b.name, "sv"));
    }

    function getChampionRanking() {
      return getRanking(30);
    }

    function getScorerRanking() {
      return getRanking(32, {
        "kylian mbappe": "Kylian Mbappé"
      });
    }

    function renderTopList(listEl, ranking, emptyText) {
      const topFive = ranking.slice(0, 5);
      if (!topFive.length) {
        listEl.innerHTML = `
          <li>
            <span class="champion-rank">-</span>
            <span class="champion-name empty">${escapeHtml(emptyText)}</span>
            <span class="champion-votes">0 tips</span>
          </li>
        `;
        return;
      }

      listEl.innerHTML = topFive.map((item, index) => `
        <li>
          <span class="champion-rank">${index + 1}</span>
          <span class="champion-name">${escapeHtml(item.name)}</span>
          <span class="champion-votes">${item.votes} ${item.votes === 1 ? "tips" : "tips"}</span>
        </li>
      `).join("");
    }

    function renderChampionTop() {
      renderTopList(els.championTopList, getChampionRanking(), "Inga mästartips ifyllda");
    }

    function renderScorerTop() {
      renderTopList(els.scorerTopList, getScorerRanking(), "Inga skyttekungar ifyllda");
    }

    function renderStageBlock(participant, stage) {
      const items = getStageItems(stage);
      return `
        <section class="stage-block">
          <h3 class="stage-title">${escapeHtml(stage.title)}</h3>
          <div class="tips-list">
            ${items.map(item => {
              const value = participant.values[item.valueIndex - 1]?.value || "";
              return `
                <div class="tip-row">
                  <span class="round-mark">${escapeHtml(item.label)}</span>
                  <span class="pick ${value ? "" : "empty"}">${escapeHtml(value || "Ej ifyllt")}</span>
                </div>
              `;
            }).join("")}
          </div>
        </section>
      `;
    }

    function renderFinalPicks(participant) {
      const champion = participant.values[30]?.value || "";
      const bronze = participant.values[31]?.value || "";
      const scorer = participant.values[32]?.value || "";
      const tiebreaker = participant.values[33]?.value || "";
      return `
        <div class="final-picks">
          ${[
            ["Världsmästare", champion],
            ["Brons", bronze],
            ["Skyttekung", scorer],
            ["Utslagsfråga", tiebreaker]
          ].map(([label, value]) => `
            <div class="final-pick">
              <span>${escapeHtml(label)}</span>
              <strong class="${value ? "" : "empty"}">${escapeHtml(value || "Ej ifyllt")}</strong>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderParticipants() {
      const participants = getVisibleParticipants();
      if (!participants.length) {
        els.content.innerHTML = '<div class="notice">Inga tips matchar filtret.</div>';
        return;
      }

      els.content.innerHTML = `
        <div class="participant-grid">
          ${participants.map(participant => {
            const filled = filledValues(participant);
            const total = participant.values.length;
            const stages = selectedStages();
            return `
              <article class="participant">
                <div class="participant-head">
                  <h2>${escapeHtml(participant.name)}</h2>
                 
                </div>
                ${stages.map(stage => stage.key === "extra" ? renderFinalPicks(participant) : renderStageBlock(participant, stage)).join("")}
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderRounds() {
      const participants = getVisibleParticipants();
      const stages = selectedStages();
      if (!participants.length) {
        els.content.innerHTML = '<div class="notice">Inga tips matchar filtret.</div>';
        return;
      }

      els.content.innerHTML = `
        <div class="round-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Deltagare</th>
                ${stages.flatMap(stage => getStageItems(stage)).map(item => `<th>${escapeHtml(item.label)}</th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${participants.map(participant => `
                <tr>
                  <td class="name-cell">${escapeHtml(participant.name)}</td>
                  ${stages.flatMap(stage => getStageItems(stage)).map(item => {
                    const value = participant.values[item.valueIndex - 1]?.value || "";
                    return `<td class="${value ? "" : "empty"}">${escapeHtml(value || "Ej ifyllt")}</td>`;
                  }).join("")}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderStats() {
      const totals = state.participants.map(filledValues);
      const totalPossible = state.participants.reduce((sum, participant) => sum + participant.values.length, 0);
      const totalFilled = totals.reduce((sum, value) => sum + value, 0);
      const complete = state.participants.filter(participant => filledValues(participant) === participant.values.length).length;
      const champions = new Set(state.participants.map(participant => participant.values[30]?.value).filter(Boolean));

      els.participantCount.textContent = state.participants.length;
      els.completeCount.textContent = complete;
      els.filledCount.textContent = `${totalFilled}/${totalPossible}`;
      els.championCount.textContent = champions.size;
      els.statusBadge.textContent = `${complete} av ${state.participants.length} tips kompletta`;
      renderChampionTop();
      renderScorerTop();
    }

    function renderStageOptions() {
      els.stageFilter.innerHTML = '<option value="">Alla omgångar</option>' + STAGES.map(stage =>
        `<option value="${stage.key}">${escapeHtml(stage.title)}</option>`
      ).join("");
    }

    function render() {
      els.participantView.setAttribute("aria-pressed", String(state.view === "participants"));
      els.roundView.setAttribute("aria-pressed", String(state.view === "rounds"));
      if (state.view === "participants") {
        renderParticipants();
      } else {
        renderRounds();
      }
    }

    async function loadTips() {
      try {
        const response = await fetch("slutspelstips.txt", { cache: "no-store" });
        if (!response.ok) throw new Error("Kunde inte läsa slutspelstips.txt");
        const parsed = parseTips(await response.text());
        Object.assign(state, parsed);
        renderStats();
        renderStageOptions();
        render();
      } catch (error) {
        els.statusBadge.textContent = "Kunde inte läsa tipsen";
        els.content.innerHTML = `<div class="notice">${escapeHtml(error.message)}</div>`;
      }
    }

    els.searchInput.addEventListener("input", event => {
      state.query = event.target.value.trim();
      render();
    });

    els.participantView.addEventListener("click", () => {
      state.view = "participants";
      render();
    });

    els.roundView.addEventListener("click", () => {
      state.view = "rounds";
      render();
    });

    els.stageFilter.addEventListener("change", event => {
      state.stage = event.target.value;
      render();
    });

    loadTips();
  </script>
</body>
</html>
