<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matchdetaljer VM 2026</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            background: #f7f9fc;
            color: #1d1d1d;
        }
        header {
            background: #005293;
            color: #ffffff;
            padding: 24px 16px;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 28px;
        }
        .container {
            max-width: 1000px;
            margin: 24px auto;
            padding: 0 16px 40px;
        }
        .status-box,
        .back-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            background: #e2e8f0;
            color: #0f172a;
            font-size: 14px;
            text-decoration: none;
        }
        .back-link {
            margin-right: 12px;
        }
        .section {
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.06);
            padding: 22px 24px;
            border: 1px solid rgba(0,0,0,0.04);
            margin-bottom: 22px;
        }
        .section h2 {
            margin-top: 0;
            font-size: 22px;
            color: #0f172a;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px 20px;
        }
        .info-grid div {
            background: #f8fafc;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            color: #334155;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
        }
        th {
            background: #f1f5f9;
            font-weight: 700;
        }
        .loading,
        .error {
            padding: 18px;
            border-radius: 12px;
            margin-top: 12px;
        }
        .loading {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #475569;
        }
        .error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }
        .lineup-team {
            margin-top: 14px;
        }
        .lineup-team h3 {
            margin-bottom: 8px;
            font-size: 18px;
        }
        .lineup-list {
            display: grid;
            gap: 12px;
        }
        .lineup-list div {
            background: #f8fafc;
            padding: 10px 12px;
            border-radius: 10px;
        }
        @media (max-width: 720px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Matchdetaljer</h1>
    </header>
    <div class="container">
        <div>
            <a class="back-link" href="FIFA2026-matcher.html">← Tillbaka till matcher</a>
            <span class="status-box" id="status">Laddar matchdetaljer...</span>
        </div>

        <div id="matchInfo" class="section loading">Hämtar matchinformation...</div>
        <div id="lineups" class="section"></div>
        <div id="headtohead" class="section"></div>
        <div id="odds" class="section"></div>
    </div>

    <script>
        const API_KEY = "170d2afb853fb860d9432d14d7eaaaa5";
        const BASE_URL = "https://v3.football.api-sports.io";

        function getQueryParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        function formatDate(dateString) {
            return new Intl.DateTimeFormat("sv-SE", {
                weekday: "long",
                day: "2-digit",
                month: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
                hour12: false,
                timeZone: "Europe/Stockholm"
            }).format(new Date(dateString));
        }

        async function apiFootball(endpoint) {
            const response = await fetch(`${BASE_URL}/${endpoint}`, {
                headers: { "x-apisports-key": API_KEY }
            });
            if (!response.ok) {
                const text = await response.text();
                throw new Error(`API-fel ${response.status}: ${response.statusText} ${text}`);
            }
            return response.json();
        }

        function renderMatchSummary(match) {
            const home = match.teams.home.name;
            const away = match.teams.away.name;
            const date = formatDate(match.fixture.date);
            const venue = match.fixture.venue?.name || "Okänt stadium";
            const city = match.fixture.venue?.city || "";
            const status = match.fixture.status.long || match.fixture.status.short || "Okänt";

            return `
                <h2>Matchinformation</h2>
                <div class="info-grid">
                    <div><strong>Match:</strong> ${home} — ${away}</div>
                    <div><strong>Datum:</strong> ${date}</div>
                    <div><strong>Status:</strong> ${status}</div>
                    <div><strong>Arena:</strong> ${venue}${city ? ', ' + city : ''}</div>
                    <div><strong>Match ID:</strong> ${match.fixture.id}</div>
                    <div><strong>Turnering:</strong> ${match.league.name}</div>
                </div>
            `;
        }

        function renderLineups(lineups) {
            if (!lineups.length) {
                return `<h2>Startelvor</h2><div class="error">Inga startelvor tillgängliga för denna match.</div>`;
            }

            return `
                <h2>Startelvor</h2>
                ${lineups.map(team => {
                    const starters = team.startXI || [];
                    const subs = team.substitutes || [];
                    return `
                        <div class="lineup-team">
                            <h3>${team.team.name}</h3>
                            <div class="lineup-list">
                                <div><strong>Startelva:</strong><br>${starters.map(p => `${p.player.name} (${p.player.number})`).join('<br>') || 'Ingen data'}</div>
                                <div><strong>Bänken:</strong><br>${subs.map(p => `${p.player.name} (${p.player.number})`).join('<br>') || 'Ingen data'}</div>
                            </div>
                        </div>
                    `;
                }).join('')}
            `;
        }

        function renderOdds(oddsResponse) {
            if (!oddsResponse.length) {
                return `<h2>Odds</h2><div class="error">Inga odds finns för denna match.</div>`;
            }

            return `
                <h2>Odds</h2>
                ${oddsResponse.map(entry => {
                    const bookmakers = entry.bookmakers || entry.odds || [];
                    return bookmakers.length === 0 ? `<div class="error">Inga bookmaker-data.</div>` : bookmakers.map(bookmaker => {
                        const bets = bookmaker.bets || [];
                        return `
                            <div class="section" style="margin-bottom:12px; padding:14px;">
                                <h3>${bookmaker.name}</h3>
                                ${bets.map(bet => {
                                    const values = bet.values || [];
                                    return `
                                        <div style="margin-top:10px;">
                                            <strong>${bet.name}</strong><br>
                                            ${values.map(v => `${v.value}: ${v.odd}`).join('<br>') || 'Ingen odds-data'}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        `;
                    }).join('');
                }).join('')}
            `;
        }

        function renderHeadToHead(response, homeId, awayId) {
            if (!response.length) {
                return `<h2>Head to Head</h2><div class="error">Ingen head-to-head-data hittades.</div>`;
            }

            const rows = response.map(match => {
                const date = formatDate(match.fixture.date);
                const homeName = match.teams.home.name;
                const awayName = match.teams.away.name;
                const homeGoals = match.goals.home !== null ? match.goals.home : '-';
                const awayGoals = match.goals.away !== null ? match.goals.away : '-';
                return `
                    <tr>
                        <td>${date}</td>
                        <td>${homeName}</td>
                        <td>${awayName}</td>
                        <td>${homeGoals} - ${awayGoals}</td>
                        <td>${match.league.name}</td>
                    </tr>
                `;
            }).join('');

            return `
                <h2>Head to Head</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Datum</th>
                            <th>Hemmalag</th>
                            <th>Bortalag</th>
                            <th>Resultat</th>
                            <th>Turnering</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        async function loadMatchDetails() {
            const statusBox = document.getElementById('status');
            const matchInfoBox = document.getElementById('matchInfo');
            const lineupsBox = document.getElementById('lineups');
            const oddsBox = document.getElementById('odds');
            const headtoheadBox = document.getElementById('headtohead');

            const fixtureId = getQueryParam('fixture');
            let homeId = getQueryParam('home');
            let awayId = getQueryParam('away');

            if (!fixtureId) {
                matchInfoBox.className = 'section error';
                matchInfoBox.innerHTML = 'Ingen match vald. Ange fixture-id i URL:en.';
                statusBox.textContent = 'Fel: Ingen match vald.';
                return;
            }

            try {
                const [fixtureData, lineupsData, oddsData] = await Promise.all([
                    apiFootball(`fixtures?id=${fixtureId}`),
                    apiFootball(`fixtures/lineups?fixture=${fixtureId}`),
                    apiFootball(`odds?fixture=${fixtureId}`)
                ]);

                const match = fixtureData.response[0];
                if (!match) {
                    throw new Error('Matchdata saknas.');
                }

                matchInfoBox.className = 'section';
                matchInfoBox.innerHTML = renderMatchSummary(match);

                lineupsBox.innerHTML = renderLineups(lineupsData.response || []);
                oddsBox.innerHTML = renderOdds(oddsData.response || []);
                statusBox.textContent = `Visar detaljer för ${match.teams.home.name} vs ${match.teams.away.name}.`;

                if (!homeId || !awayId) {
                    homeId = match.teams.home.id;
                    awayId = match.teams.away.id;
                }

                try {
                    const head2headData = await apiFootball(`fixtures/headtohead?h2h=${homeId}-${awayId}`);
                    headtoheadBox.innerHTML = renderHeadToHead(head2headData.response || [], homeId, awayId);
                } catch (headError) {
                    console.warn('Head-to-head saknas:', headError);
                    headtoheadBox.innerHTML = `<h2>Head to Head</h2><div class="error">Kan inte hämta head-to-head-data för denna match.</div>`;
                }
            } catch (error) {
                console.error(error);
                matchInfoBox.className = 'section error';
                matchInfoBox.innerHTML = `Kunde inte hämta matchdetaljer. ${error.message}`;
                lineupsBox.innerHTML = '';
                oddsBox.innerHTML = '';
                headtoheadBox.innerHTML = '';
                statusBox.textContent = 'Fel vid hämtning av matchdetaljer.';
            }
        }

        loadMatchDetails();
    </script>
</body>
</html>
