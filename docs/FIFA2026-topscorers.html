<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VM 2026 Skytteligaledare</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fb;
            color: #102a43;
        }
        header {
            background: #0f4c81;
            color: #ffffff;
            padding: 22px 18px;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: clamp(2rem, 3vw, 2.6rem);
            letter-spacing: -0.04em;
        }
        .container {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 18px 40px;
        }
        .status-box {
            display: inline-flex;
            align-items: center;
            padding: 12px 14px;
            border-radius: 14px;
            background: #e2e8f0;
            color: #102a43;
            font-size: 0.95rem;
            margin-bottom: 18px;
        }
        .note {
            margin-bottom: 18px;
            padding: 16px 18px;
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #dbe3ea;
            color: #334e68;
            line-height: 1.6;
        }
        .topscorers-table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 18px 40px rgba(16, 42, 67, 0.08);
        }
        .topscorers-table thead {
            background: linear-gradient(90deg, #0f4c81, #2566a8);
            color: #ffffff;
        }
        .topscorers-table th,
        .topscorers-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #e1e8f0;
            font-size: 0.95rem;
        }
        .topscorers-table tbody tr:nth-child(even) {
            background: #f4f7fb;
        }
        .topscorers-table td.rank {
            width: 60px;
            font-weight: 700;
            color: #0f4c81;
        }
        .player-name {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .player-team {
            color: #4a6d87;
            font-size: 0.9rem;
        }
        .loading,
        .error {
            padding: 18px;
            border-radius: 16px;
            margin-top: 12px;
        }
        .loading {
            background: #ffffff;
            border: 1px solid #dbe3ea;
            color: #334e68;
        }
        .error {
            background: #ffe0e0;
            border: 1px solid #fecaca;
            color: #9f1239;
        }
        @media (max-width: 760px) {
            .topscorers-table th,
            .topscorers-table td {
                padding: 12px 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>VM 2026 - Skytteligaledare</h1>
    </header>
    <div class="container">
 
        <div class="status-box" id="status">Laddar toppskyttar...</div>
        <div id="topscorers">
            <div class="loading">Hämtar data från API...</div>
        </div>
    </div>
    <script>
        const API_KEY = "170d2afb853fb860d9432d14d7eaaaa5"; // ⚠️ Byt ut mot din API-nyckel från api-football.com
        const BASE_URL = "https://v3.football.api-sports.io";
        const LEAGUE = 1;
        const SEASON = 2026;
        const MAX_PLAYERS = 20;
        const FINISHED_STATUSES = new Set(["FT", "AET", "PEN"]);

        async function apiFootball(endpoint) {
            const response = await fetch(`${BASE_URL}/${endpoint}`, {
                headers: {
                    "x-apisports-key": API_KEY
                }
            });
            if (!response.ok) {
                const text = await response.text();
                throw new Error(`API-fel ${response.status}: ${response.statusText} ${text}`);
            }
            return response.json();
        }

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, char => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            }[char]));
        }

        function personKey(person, team) {
            return String(person.id || `${person.name || ""}-${team.id || team.name || ""}`).toLowerCase();
        }

        function createPlayerEntry(player, team) {
            return {
                player: {
                    id: player.id,
                    name: player.name || "-"
                },
                team: {
                    id: team.id,
                    name: team.name || "-"
                },
                statistics: [{
                    games: { scoringMatches: 0, minutes: 0 },
                    goals: { total: 0, assists: 0 },
                    penalties: { total: 0 },
                    fixtureIds: new Set(),
                    minutesFixtureIds: new Set()
                }]
            };
        }

        async function loadFinishedFixtures() {
            const data = await apiFootball(`fixtures?league=${LEAGUE}&season=${SEASON}`);
            return (data.response || []).filter(match =>
                FINISHED_STATUSES.has(match.fixture?.status?.short)
            );
        }

        async function mapWithConcurrency(items, limit, worker) {
            const queue = [...items];
            const workers = Array.from({ length: Math.min(limit, queue.length) }, async () => {
                while (queue.length) {
                    const item = queue.shift();
                    await worker(item);
                }
            });
            await Promise.all(workers);
        }

        function addPlayerMinutes(entries, fixtureId, team, player, playerStats) {
            if (!player?.name) return;

            const key = personKey(player, team);
            if (!entries.has(key)) {
                entries.set(key, createPlayerEntry(player, team));
            }

            const stats = entries.get(key).statistics[0];
            if (stats.minutesFixtureIds.has(fixtureId)) return;

            const minutes = Number(playerStats.games?.minutes ?? 0);
            stats.games.minutes += Number.isFinite(minutes) ? minutes : 0;
            stats.minutesFixtureIds.add(fixtureId);
        }

        function addGoalEvent(entries, fixtureId, event) {
            if (event.type !== "Goal" || ["Missed Penalty", "Own Goal", "Cancelled goal"].includes(event.detail)) return;

            const player = event.player || {};
            const team = event.team || {};
            if (!player.name) return;

            const key = personKey(player, team);
            if (!entries.has(key)) {
                entries.set(key, createPlayerEntry(player, team));
            }

            const stats = entries.get(key).statistics[0];
            stats.goals.total += 1;
            stats.fixtureIds.add(fixtureId);
            stats.games.scoringMatches = stats.fixtureIds.size;
            if (event.detail === "Penalty") {
                stats.penalties.total += 1;
            }

            const assist = event.assist || {};
            if (assist.name) {
                const assistKey = personKey(assist, team);
                if (!entries.has(assistKey)) {
                    entries.set(assistKey, createPlayerEntry(assist, team));
                }
                const assistStats = entries.get(assistKey).statistics[0];
                assistStats.goals.assists += 1;
            }
        }

        async function addFixturePlayerStatistics(entries, match) {
            const data = await apiFootball(`fixtures/players?fixture=${match.fixture.id}`);
            (data.response || []).forEach(teamStats => {
                const team = teamStats.team || {};
                (teamStats.players || []).forEach(item => {
                    addPlayerMinutes(entries, match.fixture.id, team, item.player || {}, item.statistics?.[0] || {});
                });
            });
        }

        async function addFixtureEvents(entries, match) {
            const data = await apiFootball(`fixtures/events?fixture=${match.fixture.id}`);
            (data.response || []).forEach(event => {
                addGoalEvent(entries, match.fixture.id, event);
            });
        }

        async function loadTopscorersFromEvents(fixtures) {
            const entries = new Map();

            await mapWithConcurrency(fixtures, 4, async match => {
                try {
                    await Promise.all([
                        addFixturePlayerStatistics(entries, match),
                        addFixtureEvents(entries, match)
                    ]);
                } catch (error) {
                    console.warn(`Kunde inte hämta mål-events för match ${match.fixture.id}:`, error);
                }
            });

            return Array.from(entries.values()).filter(item =>
                (item.statistics?.[0]?.goals?.total ?? 0) > 0
            ).sort((a, b) => {
                const aStats = a.statistics?.[0] || {};
                const bStats = b.statistics?.[0] || {};
                const goalDiff = (bStats.goals?.total ?? 0) - (aStats.goals?.total ?? 0);
                if (goalDiff) return goalDiff;
                const assistDiff = (bStats.goals?.assists ?? 0) - (aStats.goals?.assists ?? 0);
                if (assistDiff) return assistDiff;
                const aMinutes = aStats.games?.minutes ?? Number.MAX_SAFE_INTEGER;
                const bMinutes = bStats.games?.minutes ?? Number.MAX_SAFE_INTEGER;
                const minutesDiff = aMinutes - bMinutes;
                if (minutesDiff) return minutesDiff;
                return (a.player?.name || "").localeCompare(b.player?.name || "", "sv");
            });
        }

        function renderTopscorers(players) {
            const rows = players.slice(0, MAX_PLAYERS).map((item, index) => {
                const player = item.player || {};
                const team = item.team || {};
                const statistics = item.statistics?.[0] || {};
                const goals = statistics.goals?.total ?? 0;
                const assists = statistics.goals?.assists ?? 0;
                const penalties = statistics.penalties?.total ?? 0;
                const minutes = statistics.games?.minutes ?? 0;
                const nationality = player.nationality || "-";
                return `
                    <tr>
                        <td class="rank">${index + 1}</td>
                        <td>
                            <div class="player-name">${escapeHtml(player.name || "-")}</div>
                            <div class="player-team">${escapeHtml(team.name || "-")} | ${escapeHtml(nationality)}</div>
                        </td>
                        <td>${goals}</td>
                        <td>${assists}</td>
                        <td>${penalties}</td>
                        <td>${minutes}</td>
                    </tr>
                `;
            }).join("");

            return `
                <table class="topscorers-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Spelare</th>
                            <th>Mål</th>
                            <th>Assist</th>
                            <th>Straffmål</th>
                            <th>Minuter</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        async function loadTopscorers() {
            const container = document.getElementById("topscorers");
            const status = document.getElementById("status");
            try {
                const fixtures = await loadFinishedFixtures();
                const players = await loadTopscorersFromEvents(fixtures);
                if (players.length === 0) {
                    container.innerHTML = `<div class="error">Inga topplista-data hittades.</div>`;
                    status.textContent = "Inga toppskyttar hittades.";
                    return;
                }
                container.innerHTML = renderTopscorers(players);
                status.textContent = `Visar de ${Math.min(players.length, MAX_PLAYERS)} bästa målskyttarna i VM 2026.`;
            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="error">Kunde inte hämta toppskyttar. Kontrollera API-nyckeln och att tjänsten är tillgänglig.</div>`;
                status.textContent = "Fel vid hämtning av toppskyttar.";
            }
        }

        loadTopscorers();
    </script>
</body>
</html>
