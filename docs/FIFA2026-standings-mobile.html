<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VM 2026 Gruppstallningar - Mobil</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: #122547;
      background: #eef4fb;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 16px;
      background: #ffffff;
      border-bottom: 1px solid rgba(18, 37, 71, 0.1);
      box-shadow: 0 8px 24px rgba(18, 37, 71, 0.08);
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      color: #0f2a4d;
      letter-spacing: 0;
    }

    .status {
      margin: 8px 0 0;
      color: #4d657f;
      font-size: 0.88rem;
      line-height: 1.45;
    }

    main {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 14px 12px 28px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tab {
      border: 1px solid rgba(18, 37, 71, 0.12);
      border-radius: 8px;
      background: #ffffff;
      color: #254762;
      padding: 10px 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .tab.active {
      background: #005293;
      color: #ffffff;
      border-color: #005293;
    }

    .group {
      margin-bottom: 12px;
      background: #ffffff;
      border: 1px solid rgba(18, 37, 71, 0.08);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(18, 37, 71, 0.08);
    }

    .group h2 {
      margin: 0;
      padding: 12px 14px;
      color: #ffffff;
      background: #005293;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .rows {
      display: grid;
    }

    .row {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) 32px 32px 32px 38px 34px;
      gap: 6px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(18, 37, 71, 0.08);
      font-size: 0.88rem;
    }

    .row:last-child {
      border-bottom: 0;
    }

    .row.head {
      background: #f3f7fb;
      color: #4d657f;
      font-size: 0.76rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .rank {
      font-weight: 800;
      color: #005293;
    }

    .team {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .points {
      font-weight: 800;
      color: #0f2a4d;
    }

    .panel[hidden] {
      display: none;
    }

    .empty,
    .error {
      padding: 16px;
      border-radius: 8px;
      line-height: 1.6;
      background: #ffffff;
      border: 1px solid rgba(18, 37, 71, 0.1);
      color: #42526a;
    }

    .error {
      color: #991b1b;
      background: #fff1f2;
      border-color: #fecdd3;
    }

    @media (max-width: 380px) {
      .row {
        grid-template-columns: 28px minmax(0, 1fr) 28px 28px 28px 34px 32px;
        gap: 4px;
        padding: 9px 8px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Gruppstallningar</h1>
    <p class="status" id="status">Laddar gruppstallningar...</p>
  </header>

  <main>
    <div class="tabs" role="tablist">
      <button class="tab active" id="groupsTab" type="button">Grupper</button>
      <button class="tab" id="thirdsTab" type="button">Basta treor</button>
    </div>

    <section class="panel" id="groupsPanel"></section>
    <section class="panel" id="thirdsPanel" hidden></section>
  </main>

  <script>
    const API_KEY = "170d2afb853fb860d9432d14d7eaaaa5";
    const BASE_URL = "https://v3.football.api-sports.io";
    const LEAGUE = 1;
    const SEASON = 2026;
    const FINISHED_STATUSES = new Set(["FT", "AET", "PEN"]);

    const statusEl = document.getElementById("status");
    const groupsPanel = document.getElementById("groupsPanel");
    const thirdsPanel = document.getElementById("thirdsPanel");
    const groupsTab = document.getElementById("groupsTab");
    const thirdsTab = document.getElementById("thirdsTab");

    groupsTab.addEventListener("click", () => setTab("groups"));
    thirdsTab.addEventListener("click", () => setTab("thirds"));

    function setTab(tab) {
      const showGroups = tab === "groups";
      groupsPanel.hidden = !showGroups;
      thirdsPanel.hidden = showGroups;
      groupsTab.classList.toggle("active", showGroups);
      thirdsTab.classList.toggle("active", !showGroups);
    }

    async function apiFootball(endpoint) {
      const response = await fetch(`${BASE_URL}/${endpoint}`, {
        headers: { "x-apisports-key": API_KEY }
      });
      if (!response.ok) throw new Error(`API-fel ${response.status}`);
      return response.json();
    }

    function getGroupLetter(groupName) {
      const match = String(groupName || "").match(/(?:Group|Grupp)\s*([A-L])\b/i);
      return match ? match[1].toUpperCase() : "";
    }

    function isRealGroup(groupData) {
      return Boolean(getGroupLetter(groupData[0]?.group));
    }

    function groupTitle(groupData, index) {
      const letter = getGroupLetter(groupData[0]?.group);
      return letter ? `Grupp ${letter}` : `Grupp ${String.fromCharCode(65 + index)}`;
    }

    function buildComputedGroups(standings, fixtures) {
      const groups = standings.filter(isRealGroup).map(group => group.map((team, index) => ({
        team: team.team,
        group: team.group,
        seedRank: Number(team.rank) || index + 1,
        rank: index + 1,
        points: 0,
        goalsDiff: 0,
        all: {
          played: 0,
          win: 0,
          draw: 0,
          lose: 0,
          goals: { for: 0, against: 0 }
        }
      })));

      const groupByTeamId = new Map();
      groups.forEach((group, groupIndex) => {
        group.forEach(team => {
          if (team.team?.id !== undefined && team.team?.id !== null) {
            groupByTeamId.set(String(team.team.id), groupIndex);
          }
        });
      });

      fixtures.forEach(match => {
        const status = match.fixture?.status?.short;
        const homeGoals = match.goals?.home;
        const awayGoals = match.goals?.away;
        if (!FINISHED_STATUSES.has(status) || homeGoals == null || awayGoals == null) return;
        if (!/^Group Stage\b/i.test(match.league?.round || "")) return;

        const homeGroupIndex = groupByTeamId.get(String(match.teams?.home?.id));
        const awayGroupIndex = groupByTeamId.get(String(match.teams?.away?.id));
        if (homeGroupIndex === undefined || homeGroupIndex !== awayGroupIndex) return;

        const group = groups[homeGroupIndex];
        const home = group.find(team => String(team.team?.id) === String(match.teams?.home?.id));
        const away = group.find(team => String(team.team?.id) === String(match.teams?.away?.id));
        if (!home || !away) return;

        applyResult(home, Number(homeGoals), Number(awayGoals));
        applyResult(away, Number(awayGoals), Number(homeGoals));
      });

      return groups.map(group => group
        .slice()
        .sort(sortGroupRows)
        .map((team, index) => {
          team.rank = index + 1;
          return team;
        }));
    }

    function applyResult(team, goalsFor, goalsAgainst) {
      team.all.played += 1;
      team.all.goals.for += goalsFor;
      team.all.goals.against += goalsAgainst;
      team.goalsDiff = team.all.goals.for - team.all.goals.against;

      if (goalsFor > goalsAgainst) {
        team.all.win += 1;
        team.points += 3;
      } else if (goalsFor === goalsAgainst) {
        team.all.draw += 1;
        team.points += 1;
      } else {
        team.all.lose += 1;
      }
    }

    function sortGroupRows(a, b) {
      return (b.points ?? 0) - (a.points ?? 0) ||
        (b.goalsDiff ?? 0) - (a.goalsDiff ?? 0) ||
        (b.all?.goals?.for ?? 0) - (a.all?.goals?.for ?? 0) ||
        a.seedRank - b.seedRank ||
        a.team.name.localeCompare(b.team.name, "sv");
    }

    function renderGroup(groupData, index) {
      const rows = groupData.map(renderRow).join("");
      return `
        <article class="group">
          <h2>${groupTitle(groupData, index)}</h2>
          <div class="rows">
            <div class="row head">
              <span>#</span><span>Lag</span><span class="num">Sp</span><span class="num">V</span><span class="num">O</span><span class="num">MS</span><span class="num">P</span>
            </div>
            ${rows}
          </div>
        </article>
      `;
    }

    function renderRow(team) {
      const stats = team.all || {};
      return `
        <div class="row">
          <span class="rank">${team.rank}</span>
          <span class="team">${team.team.name}</span>
          <span class="num">${stats.played ?? 0}</span>
          <span class="num">${stats.win ?? 0}</span>
          <span class="num">${stats.draw ?? 0}</span>
          <span class="num">${team.goalsDiff ?? 0}</span>
          <span class="num points">${team.points ?? 0}</span>
        </div>
      `;
    }

    function renderThirds(groups) {
      const thirds = groups
        .map(group => group.find(team => String(team.rank) === "3"))
        .filter(Boolean)
        .sort(sortGroupRows)
        .map((team, index) => ({ ...team, rank: index + 1 }));

      if (!thirds.length) return '<div class="empty">Inga treor kunde visas.</div>';

      return `
        <article class="group">
          <h2>Basta placerade treor</h2>
          <div class="rows">
            <div class="row head">
              <span>#</span><span>Lag</span><span class="num">Sp</span><span class="num">V</span><span class="num">O</span><span class="num">MS</span><span class="num">P</span>
            </div>
            ${thirds.map(renderRow).join("")}
          </div>
        </article>
      `;
    }

    function formatStatus(message) {
      const updatedAt = new Date().toLocaleString("sv-SE", {
        dateStyle: "short",
        timeStyle: "short"
      });
      return `${message} Senast uppdaterad: ${updatedAt}.`;
    }

    async function loadStandings() {
      try {
        const standingsData = await apiFootball(`standings?league=${LEAGUE}&season=${SEASON}`);
        const standings = standingsData.response[0]?.league?.standings || [];
        let groups = standings.filter(isRealGroup);
        let fixtures = [];
        let computed = false;

        if (!groups.length) {
          groupsPanel.innerHTML = '<div class="error">Inga gruppstallningar hittades.</div>';
          statusEl.textContent = "Ingen data hittad.";
          return;
        }

        groupsPanel.innerHTML = groups.map(renderGroup).join("");
        thirdsPanel.innerHTML = renderThirds(groups);
        statusEl.textContent = formatStatus(`Visar ${groups.length} grupper.`);

        try {
          const fixturesData = await apiFootball(`fixtures?league=${LEAGUE}&season=${SEASON}`);
          fixtures = fixturesData.response || [];
          const computedGroups = buildComputedGroups(standings, fixtures);
          if (computedGroups.length) {
            groups = computedGroups;
            computed = true;
          }
        } catch (error) {
          console.warn("Kunde inte rakna tabell fran matcher.", error);
        }

        groupsPanel.innerHTML = groups.map(renderGroup).join("");
        thirdsPanel.innerHTML = renderThirds(groups);

        const finishedMatches = fixtures.filter(match =>
          FINISHED_STATUSES.has(match.fixture?.status?.short) &&
          /^Group Stage\b/i.test(match.league?.round || "")
        ).length;
        const message = computed
          ? `Visar ${groups.length} grupper och ${finishedMatches} spelade gruppmatcher.`
          : `Visar ${groups.length} grupper.`;
        statusEl.textContent = formatStatus(message);
      } catch (error) {
        console.error(error);
        groupsPanel.innerHTML = '<div class="error">Kunde inte hamta gruppstallningar.</div>';
        statusEl.textContent = "Fel vid hamtning av gruppstallningar.";
      }
    }

    loadStandings();
  </script>
</body>
</html>
