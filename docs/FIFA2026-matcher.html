<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VM 2026 Matcher</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            background: #f7f9fc;
            color: #1d1d1d;
        }
        header {
            background: #005293;
            color: #ffffff;
            padding: 24px 16px;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 28px;
        }
        .container {
            max-width: 980px;
            margin: 24px auto;
            padding: 0 16px 40px;
        }
        .note {
            background: #fff5c2;
            border: 1px solid #fcd34d;
            color: #663c00;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .status-box {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            background: #e2e8f0;
            color: #0f172a;
            font-size: 14px;
        }
        .matches {
            display: grid;
            gap: 18px;
        }
        .match-link {
            display: block;
            color: inherit;
            text-decoration: none;
        }
        .match-card {
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.06);
            padding: 18px 20px;
            border: 1px solid rgba(0,0,0,0.04);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .match-link:hover .match-card {
            transform: translateY(-2px);
            box-shadow: 0 16px 36px rgba(0,0,0,0.12);
        }
        .match-date {
            font-size: 14px;
            color: #475569;
            margin-bottom: 6px;
        }
        .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .team-name {
            flex: 1 1 40%;
            font-weight: 700;
            font-size: 16px;
        }
        .score {
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
            min-width: 90px;
            text-align: center;
        }
        .match-details {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            color: #334155;
            font-size: 14px;
        }
        .match-details span {
            background: #f1f5f9;
            padding: 7px 10px;
            border-radius: 999px;
        }
        .match-details .lineup-ready {
            background: #dcfce7;
            color: #166534;
            font-weight: 700;
        }
        .match-details .lineup-waiting {
            background: #fff7ed;
            color: #9a3412;
            font-weight: 700;
        }
        .match-details .lineup-ready::before,
        .match-details .lineup-waiting::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            margin-right: 6px;
            border-radius: 999px;
            background: currentColor;
        }
        .error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 16px;
            border-radius: 12px;
        }
        .loading {
            padding: 18px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #475569;
        }
        @media (max-width: 640px) {
            .match-teams {
                flex-direction: column;
                align-items: stretch;
            }
            .score {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>VM 2026 matcher</h1>
        <p class="status-box" id="status">Laddar matcher från api-football...</p>
    </header>
    <div class="container">
        <div class="note">
            <strong>Obs:</strong> Klicka på en match för att se mer detaljer som startelvor, odds och head-to-head.
        </div>
        <div id="matches" class="matches">
            <div class="loading">Hämtar matcher...</div>
        </div>
    </div>

    <script>
        const API_KEY = "170d2afb853fb860d9432d14d7eaaaa5"; // ⚠️ Byt ut mot din API-nyckel från api-football.com
        const BASE_URL = "https://v3.football.api-sports.io";
        const LEAGUE = 1;
        const SEASON = 2026;
        const LINEUP_RECHECK_MS = 2 * 60 * 1000;
        const lineupStatus = new Map();
        const lineupCheckedAt = new Map();
        let lineupRefreshTimer = null;

        async function apiFootball(endpoint) {
            const response = await fetch(`${BASE_URL}/${endpoint}`, {
                headers: {
                    "x-apisports-key": API_KEY
                }
            });

            if (!response.ok) {
                const text = await response.text();
                throw new Error(`API-fel ${response.status}: ${response.statusText} ${text}`);
            }

            return response.json();
        }

        function formatDate(dateString) {
            return new Intl.DateTimeFormat("sv-SE", {
                weekday: "long",
                day: "2-digit",
                month: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
                hour12: false,
                timeZone: "Europe/Stockholm"
            }).format(new Date(dateString));
        }

        function matchState(match) {
            const short = match.fixture.status.short;
            if (["1H", "HT", "2H", "ET", "BT", "P", "SUSP", "INT", "LIVE"].includes(short)) return "live";
            if (["FT", "AET", "PEN"].includes(short)) return "finished";
            return "upcoming";
        }

        function isLineupCheckWindow(match) {
            const state = matchState(match);
            if (state === "live") return true;
            if (state !== "upcoming") return false;

            const kickoff = new Date(match.fixture.date).getTime();
            if (Number.isNaN(kickoff)) return false;

            const hoursUntilKickoff = (kickoff - Date.now()) / (1000 * 60 * 60);
            return hoursUntilKickoff <= 4 && hoursUntilKickoff >= -1;
        }

        function hasStartingLineups(lineups) {
            return (lineups || []).some(team => (team.startXI || []).length >= 11);
        }

        function lineupBadge(match) {
            const fixtureId = match.fixture.id;
            const knownStatus = lineupStatus.get(fixtureId);
            if (knownStatus === true) {
                return '<span class="lineup-ready" title="API-Football har publicerat startelvor">Startelvor klara</span>';
            }
            if (isLineupCheckWindow(match)) {
                return '<span class="lineup-waiting" title="Kontrolleras automatiskt inför avspark">Startelvor väntar</span>';
            }
            return "";
        }

        function buildMatchCard(match) {
            const home = match.teams.home.name;
            const away = match.teams.away.name;
            const homeGoals = match.goals.home !== null ? match.goals.home : "-";
            const awayGoals = match.goals.away !== null ? match.goals.away : "-";
            const status = match.fixture.status.long || match.fixture.status.short || "Okänt";
            const venue = match.fixture.venue?.name || "Plats saknas";
            const city = match.fixture.venue?.city ? `, ${match.fixture.venue.city}` : "";
            const date = formatDate(match.fixture.date);
            const fixtureId = match.fixture.id;
            const homeId = match.teams.home.id;
            const awayId = match.teams.away.id;

            return `
                <a class="match-link" href="FIFA2026-match-details.html?fixture=${fixtureId}&home=${homeId}&away=${awayId}">
                    <article class="match-card">
                        <div class="match-date">${date}</div>
                        <div class="match-teams">
                            <div class="team-name">${home}</div>
                            <div class="score">${homeGoals} – ${awayGoals}</div>
                            <div class="team-name">${away}</div>
                        </div>
                        <div class="match-details">
                            <span>Status: ${status}</span>
                            <span>Stadium: ${venue}${city}</span>
                            <span>Match ID: ${fixtureId}</span>
                            ${lineupBadge(match)}
                        </div>
                    </article>
                </a>
            `;
        }

        async function updateLineupStatuses(matches, render) {
            const now = Date.now();
            const candidates = matches
                .filter(match => isLineupCheckWindow(match))
                .filter(match => lineupStatus.get(match.fixture.id) !== true)
                .filter(match => now - (lineupCheckedAt.get(match.fixture.id) || 0) > LINEUP_RECHECK_MS)
                .slice(0, 12);

            if (!candidates.length) return;

            await Promise.all(candidates.map(async match => {
                lineupCheckedAt.set(match.fixture.id, Date.now());
                try {
                    const data = await apiFootball(`fixtures/lineups?fixture=${match.fixture.id}`);
                    lineupStatus.set(match.fixture.id, hasStartingLineups(data.response));
                } catch (error) {
                    console.warn("Kunde inte kontrollera startelvor:", match.fixture.id, error);
                    lineupStatus.set(match.fixture.id, false);
                }
            }));

            render();

            if (candidates.some(match => lineupStatus.get(match.fixture.id) !== true) && !lineupRefreshTimer) {
                lineupRefreshTimer = window.setTimeout(() => {
                    lineupRefreshTimer = null;
                    render();
                    updateLineupStatuses(matches, render);
                }, LINEUP_RECHECK_MS);
            }
        }

        async function loadMatches() {
            const container = document.getElementById("matches");
            const statusBox = document.getElementById("status");

            try {
                const data = await apiFootball(`fixtures?league=${LEAGUE}&season=${SEASON}`);
                const matches = data.response || [];

                if (matches.length === 0) {
                    container.innerHTML = `<div class="error">Inga matcher hittades för VM 2026.</div>`;
                    statusBox.textContent = "Ingen data hittad.";
                    return;
                }

                const sorted = matches.sort((a, b) => new Date(a.fixture.date) - new Date(b.fixture.date));
                const renderSortedMatches = () => {
                    container.innerHTML = sorted.map(buildMatchCard).join("");
                };
                renderSortedMatches();
                updateLineupStatuses(sorted, renderSortedMatches);
                statusBox.textContent = `Visa ${sorted.length} matcher för FIFA World Cup 2026.`;
            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="error">Kunde inte hämta matcher. Kontrollera API-nyckeln och att tjänsten är tillgänglig.</div>`;
                statusBox.textContent = "Fel vid hämtning av matcher.";
            }
        }

        loadMatches();
    </script>
</body>
</html>
