<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VM 2026 Skytteligaledare</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fb;
            color: #102a43;
        }
        header {
            background: #0f4c81;
            color: #ffffff;
            padding: 22px 18px;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: clamp(2rem, 3vw, 2.6rem);
            letter-spacing: -0.04em;
        }
        .container {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 18px 40px;
        }
        .status-box {
            display: inline-flex;
            align-items: center;
            padding: 12px 14px;
            border-radius: 14px;
            background: #e2e8f0;
            color: #102a43;
            font-size: 0.95rem;
            margin-bottom: 18px;
        }
        .note {
            margin-bottom: 18px;
            padding: 16px 18px;
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #dbe3ea;
            color: #334e68;
            line-height: 1.6;
        }
        .topscorers-table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 18px 40px rgba(16, 42, 67, 0.08);
        }
        .topscorers-table thead {
            background: linear-gradient(90deg, #0f4c81, #2566a8);
            color: #ffffff;
        }
        .topscorers-table th,
        .topscorers-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #e1e8f0;
            font-size: 0.95rem;
        }
        .topscorers-table tbody tr:nth-child(even) {
            background: #f4f7fb;
        }
        .topscorers-table td.rank {
            width: 60px;
            font-weight: 700;
            color: #0f4c81;
        }
        .player-name {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .player-team {
            color: #4a6d87;
            font-size: 0.9rem;
        }
        .loading,
        .error {
            padding: 18px;
            border-radius: 16px;
            margin-top: 12px;
        }
        .loading {
            background: #ffffff;
            border: 1px solid #dbe3ea;
            color: #334e68;
        }
        .error {
            background: #ffe0e0;
            border: 1px solid #fecaca;
            color: #9f1239;
        }
        @media (max-width: 760px) {
            .topscorers-table th,
            .topscorers-table td {
                padding: 12px 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>VM 2026 - Skytteligaledare</h1>
    </header>
    <div class="container">
        <div class="note">
            Den här sidan hämtar de 20 bästa målskyttarna från FIFA World Cup 2026.
        
        </div>
        <div class="status-box" id="status">Laddar toppskyttar...</div>
        <div id="topscorers">
            <div class="loading">Hämtar data från API...</div>
        </div>
    </div>
    <script>
        const API_KEY = "170d2afb853fb860d9432d14d7eaaaa5"; // ⚠️ Byt ut mot din API-nyckel från api-football.com
        const BASE_URL = "https://v3.football.api-sports.io";
        const LEAGUE = 1;
        const SEASON = 2026;
        const MAX_PLAYERS = 20;

        async function apiFootball(endpoint) {
            const response = await fetch(`${BASE_URL}/${endpoint}`, {
                headers: {
                    "x-apisports-key": API_KEY
                }
            });
            if (!response.ok) {
                const text = await response.text();
                throw new Error(`API-fel ${response.status}: ${response.statusText} ${text}`);
            }
            return response.json();
        }

        function renderTopscorers(players) {
            const rows = players.slice(0, MAX_PLAYERS).map((item, index) => {
                const player = item.player || {};
                const team = item.team || {};
                const statistics = item.statistics?.[0] || {};
                const goals = statistics.goals?.total ?? 0;
                const assists = statistics.goals?.assists ?? 0;
                const penalties = statistics.penalties?.total ?? 0;
                const matches = statistics.games?.appearences ?? 0;
                const nationality = player.nationality || "-";
                return `
                    <tr>
                        <td class="rank">${index + 1}</td>
                        <td>
                            <div class="player-name">${player.name || "-"}</div>
                            <div class="player-team">${team.name || "-"} | ${nationality}</div>
                        </td>
                        <td>${goals}</td>
                        <td>${assists}</td>
                        <td>${penalties}</td>
                        <td>${matches}</td>
                    </tr>
                `;
            }).join("");

            return `
                <table class="topscorers-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Spelare</th>
                            <th>Mål</th>
                            <th>Assist</th>
                            <th>Strafmål</th>
                            <th>Matcher</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        async function loadTopscorers() {
            const container = document.getElementById("topscorers");
            const status = document.getElementById("status");
            try {
                const data = await apiFootball(`players/topscorers?league=${LEAGUE}&season=${SEASON}`);
                const players = data.response || [];
                if (players.length === 0) {
                    container.innerHTML = `<div class="error">Inga topplista-data hittades.</div>`;
                    status.textContent = "Inga toppskyttar hittades.";
                    return;
                }
                container.innerHTML = renderTopscorers(players);
                status.textContent = `Visar de ${Math.min(players.length, MAX_PLAYERS)} bästa målskyttarna i VM 2026.`;
            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="error">Kunde inte hämta toppskyttar. Kontrollera API-nyckeln och att tjänsten är tillgänglig.</div>`;
                status.textContent = "Fel vid hämtning av toppskyttar.";
            }
        }

        loadTopscorers();
    </script>
</body>
</html>
