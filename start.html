<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>A&A VM tips 2026</title>
    <style>
        html,body{height:100%;margin:0}
        body{display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#667eea,#764ba2);font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;color:#fff}
        .wrap{text-align:center;padding:28px 18px}
        h1{font-size:48px;margin:0 0 24px}
        .hero{display:flex;align-items:center;justify-content:center;gap:26px;flex-wrap:wrap}
        .logo{width:320px;height:auto;flex:0 0 auto}
        .info-card{max-width:340px;padding:16px 18px;border-radius:14px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);box-shadow:0 10px 28px rgba(0,0,0,.12);text-align:left;flex:1 1 280px}
        .info-card h2{margin:0 0 10px;font-size:20px}
        .info-card ul{margin:0;padding-left:20px;line-height:1.7;font-size:16px}
        .countdown{margin:28px auto 0;max-width:560px}
        .countdown-title{margin:0 0 14px;font-size:20px;font-weight:700}
        .countdown-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
        .countdown-box{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:12px 10px;box-shadow:0 10px 28px rgba(0,0,0,.16)}
        .countdown-number{display:block;font-size:34px;font-weight:800;line-height:1}
        .countdown-label{display:block;margin-top:6px;font-size:13px;text-transform:uppercase;letter-spacing:.08em;opacity:.86}
        .match-info{margin:14px 0 0;font-size:15px;opacity:.92}
        @media (max-width:600px){h1{font-size:28px}.logo{width:180px}.hero{gap:14px}.info-card{max-width:100%;padding:14px 16px}.countdown-grid{gap:8px}.countdown-box{padding:10px 6px}.countdown-number{font-size:26px}.countdown-label{font-size:11px}.match-info{font-size:13px}}
    </style>
</head>
<body>
    <div class="wrap">
        <h1>A&A VM tips 2026</h1>
        <div class="hero">
            <img class="logo" src="2026_FIFA_World_Cup_emblem.svg.webp" alt="VM 2026 logga">
            <section class="info-card" aria-label="Tävlingsinformation">
                <h2>Inför spelet</h2>
                <ul>
                    <li>21 tippare</li>
                    <li>Pott: 6 300 kr</li>
                    <li>1:a pris: 5 040 kr</li>
                    <li>2:a pris: 1 260 kr</li>
                </ul>
            </section>
        </div>
        <section class="countdown" aria-label="Nedräkning till första matchen">
            <p class="countdown-title" id="countdownTitle">Nedräkning till första matchen</p>
            <div class="countdown-grid">
                <div class="countdown-box"><span class="countdown-number" id="days">0</span><span class="countdown-label">Dagar</span></div>
                <div class="countdown-box"><span class="countdown-number" id="hours">0</span><span class="countdown-label">Timmar</span></div>
                <div class="countdown-box"><span class="countdown-number" id="minutes">0</span><span class="countdown-label">Minuter</span></div>
                <div class="countdown-box"><span class="countdown-number" id="seconds">0</span><span class="countdown-label">Sekunder</span></div>
            </div>
            <p class="match-info">Mexiko - Sydafrika, 11 juni 2026 kl. 21:00</p>
        </section>
    </div>
    <script>
        const firstMatchTime = new Date("2026-06-11T21:00:00+02:00").getTime();
        const countdownTitle = document.getElementById("countdownTitle");
        const days = document.getElementById("days");
        const hours = document.getElementById("hours");
        const minutes = document.getElementById("minutes");
        const seconds = document.getElementById("seconds");

        function updateCountdown() {
            const distance = firstMatchTime - Date.now();

            if (distance <= 0) {
                countdownTitle.textContent = "VM 2026 är igång!";
                days.textContent = "0";
                hours.textContent = "0";
                minutes.textContent = "0";
                seconds.textContent = "0";
                return;
            }

            days.textContent = Math.floor(distance / (1000 * 60 * 60 * 24));
            hours.textContent = Math.floor((distance / (1000 * 60 * 60)) % 24);
            minutes.textContent = Math.floor((distance / (1000 * 60)) % 60);
            seconds.textContent = Math.floor((distance / 1000) % 60);
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
