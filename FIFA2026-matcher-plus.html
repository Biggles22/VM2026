<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VM 2026 Matcher - Utökad vy</title>
    <style>
        :root {
            color: #172033;
            background: #eef3f8;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(135deg, rgba(0, 82, 147, 0.92), rgba(0, 142, 105, 0.86)),
                radial-gradient(circle at 20% 0%, rgba(254, 203, 0, 0.45), transparent 34%),
                #eef3f8;
            color: #172033;
        }

        header {
            color: #ffffff;
            padding: 34px 18px 26px;
        }

        .hero {
            width: min(1180px, 94%);
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 22px;
            align-items: end;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.8rem);
            line-height: 1;
            letter-spacing: 0;
        }

        .lead {
            margin: 14px 0 0;
            max-width: 720px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.65;
        }

        .status-box {
            display: inline-flex;
            align-items: center;
            min-height: 42px;
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.94);
            color: #0f2c45;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 14px 34px rgba(15, 44, 69, 0.18);
            white-space: nowrap;
        }

        .container {
            width: min(1180px, 94%);
            margin: 0 auto;
            padding: 0 0 42px;
        }

        .toolbar {
            display: grid;
            grid-template-columns: minmax(220px, 1.2fr) minmax(170px, 0.8fr) minmax(170px, 0.8fr);
            gap: 12px;
            margin: 0 0 16px;
            padding: 14px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(15, 44, 69, 0.08);
            box-shadow: 0 18px 46px rgba(15, 44, 69, 0.12);
        }

        label {
            display: grid;
            gap: 6px;
            font-size: 12px;
            font-weight: 800;
            color: #3b4b63;
            text-transform: uppercase;
        }

        input,
        select {
            width: 100%;
            min-height: 42px;
            border: 1px solid #cfd9e6;
            border-radius: 8px;
            padding: 9px 11px;
            font: inherit;
            color: #172033;
            background: #ffffff;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .metric {
            padding: 16px;
            border-radius: 8px;
            background: #ffffff;
            border: 1px solid rgba(15, 44, 69, 0.08);
            box-shadow: 0 12px 32px rgba(15, 44, 69, 0.08);
        }

        .metric span {
            display: block;
            color: #657389;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .metric strong {
            display: block;
            margin-top: 8px;
            font-size: 28px;
            color: #0f2c45;
        }

        .day-group {
            margin-top: 18px;
        }

        .day-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 0 0 10px;
            color: #ffffff;
        }

        .day-heading h2 {
            margin: 0;
            font-size: 20px;
        }

        .day-heading span {
            padding: 7px 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            font-size: 13px;
            font-weight: 700;
        }

        .matches {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .match-link {
            color: inherit;
            text-decoration: none;
        }

        .match-card {
            height: 100%;
            display: grid;
            gap: 14px;
            padding: 18px;
            border-radius: 8px;
            background: #ffffff;
            border: 1px solid rgba(15, 44, 69, 0.08);
            box-shadow: 0 16px 36px rgba(15, 44, 69, 0.1);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .match-link:hover .match-card {
            transform: translateY(-2px);
            box-shadow: 0 22px 48px rgba(15, 44, 69, 0.16);
        }

        .match-topline,
        .meta-row,
        .fact-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 5px 9px;
            border-radius: 999px;
            background: #eef4fb;
            color: #23435f;
            font-size: 12px;
            font-weight: 800;
        }

        .badge.live {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge.done {
            background: #dcfce7;
            color: #166534;
        }

        .kickoff {
            margin-left: auto;
            color: #657389;
            font-size: 13px;
            font-weight: 700;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
            gap: 12px;
            align-items: center;
        }

        .team {
            display: grid;
            gap: 6px;
            min-width: 0;
        }

        .team.away {
            text-align: right;
        }

        .team-name {
            font-size: 18px;
            font-weight: 800;
            color: #10243b;
        }

        .team small {
            color: #657389;
            font-weight: 700;
        }

        .score {
            min-width: 92px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #0f2c45;
            color: #ffffff;
            text-align: center;
            font-size: 26px;
            font-weight: 900;
        }

        .meta-row {
            color: #40536b;
            font-size: 14px;
            line-height: 1.45;
        }

        .fact-grid {
            padding-top: 12px;
            border-top: 1px solid #e6edf5;
        }

        .fact {
            flex: 1 1 160px;
            display: grid;
            gap: 4px;
            min-height: 58px;
            padding: 10px;
            border-radius: 8px;
            background: #f7fafc;
            border: 1px solid #e6edf5;
        }

        .fact span {
            color: #657389;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .fact strong {
            color: #172033;
            font-size: 13px;
        }

        .loading,
        .error,
        .empty {
            padding: 18px;
            border-radius: 8px;
            background: #ffffff;
            border: 1px solid rgba(15, 44, 69, 0.08);
            color: #40536b;
            box-shadow: 0 12px 32px rgba(15, 44, 69, 0.08);
        }

        .error {
            background: #fff1f2;
            border-color: #fecdd3;
            color: #9f1239;
        }

        @media (max-width: 860px) {
            .hero,
            .toolbar,
            .summary,
            .matches {
                grid-template-columns: 1fr;
            }

            .status-box,
            .kickoff {
                margin-left: 0;
                white-space: normal;
            }
        }

        @media (max-width: 560px) {
            header {
                padding-top: 24px;
            }

            .scoreboard {
                grid-template-columns: 1fr;
            }

            .team.away {
                text-align: left;
            }

            .score {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="hero">
            <div>
                <h1>VM 2026 matcher</h1>
                <p class="lead">En mer detaljerad matchvy med arena, stad, grupp, status, omgång och snabb länk till fördjupad matchinformation.</p>
            </div>
            <p class="status-box" id="status">Laddar matcher från api-football...</p>
        </div>
    </header>

    <main class="container">
        <section class="toolbar" aria-label="Filtrera matcher">
            <label>
                Sök lag eller arena
                <input id="searchInput" type="search" placeholder="Exempel: Sverige, Sweden, Grupp F">
            </label>
            <label>
                Status
                <select id="statusFilter">
                    <option value="all">Alla matcher</option>
                    <option value="upcoming">Kommande</option>
                    <option value="live">Live</option>
                    <option value="finished">Spelade</option>
                </select>
            </label>
            <label>
                Sortering
                <select id="sortOrder">
                    <option value="asc">Tidigast först</option>
                    <option value="desc">Senast först</option>
                </select>
            </label>
        </section>

        <section class="summary" aria-label="Sammanfattning">
            <div class="metric"><span>Matcher</span><strong id="totalMatches">-</strong></div>
            <div class="metric"><span>Kommande</span><strong id="upcomingMatches">-</strong></div>
            <div class="metric"><span>Spelade</span><strong id="finishedMatches">-</strong></div>
            <div class="metric"><span>Arenor</span><strong id="venueCount">-</strong></div>
        </section>

        <div id="matches">
            <div class="loading">Hämtar matcher...</div>
        </div>
    </main>

    <script>
        const API_KEY = "170d2afb853fb860d9432d14d7eaaaa5";
        const BASE_URL = "https://v3.football.api-sports.io";
        const LEAGUE = 1;
        const SEASON = 2026;

        let allMatches = [];

        async function apiFootball(endpoint) {
            const response = await fetch(`${BASE_URL}/${endpoint}`, {
                headers: { "x-apisports-key": API_KEY }
            });

            if (!response.ok) {
                const text = await response.text();
                throw new Error(`API-fel ${response.status}: ${response.statusText} ${text}`);
            }

            return response.json();
        }

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, char => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            }[char]));
        }

        function formatDate(dateString, options = {}) {
            return new Intl.DateTimeFormat("sv-SE", {
                weekday: options.weekday || "long",
                year: options.year,
                day: "2-digit",
                month: "2-digit",
                hour: options.hour === false ? undefined : "2-digit",
                minute: options.hour === false ? undefined : "2-digit",
                hour12: false,
                timeZone: "Europe/Stockholm"
            }).format(new Date(dateString));
        }

        function scoreValue(value) {
            return value !== null && value !== undefined ? value : "-";
        }

        function matchState(match) {
            const short = match.fixture.status.short;
            if (["1H", "HT", "2H", "ET", "BT", "P", "SUSP", "INT", "LIVE"].includes(short)) return "live";
            if (["FT", "AET", "PEN"].includes(short)) return "finished";
            return "upcoming";
        }

        function stateLabel(state) {
            if (state === "live") return "Live";
            if (state === "finished") return "Spelad";
            return "Kommande";
        }

        function roundLabel(match) {
            return match.league.round || match.fixture.status.long || "Omgång saknas";
        }

        const SEARCH_ALIASES = {
            algeria: ["algeriet"],
            argentina: ["argentina"],
            australia: ["australien"],
            austria: ["osterrike", "österrike"],
            belgium: ["belgien"],
            "bosnia and herzegovina": ["bosnien och hercegovina", "bosnien"],
            brazil: ["brasilien"],
            canada: ["kanada"],
            colombia: ["colombia"],
            croatia: ["kroatien"],
            "czech republic": ["tjeckien"],
            czechia: ["tjeckien"],
            denmark: ["danmark"],
            ecuador: ["ecuador"],
            egypt: ["egypten"],
            england: ["england"],
            france: ["frankrike"],
            germany: ["tyskland"],
            ghana: ["ghana"],
            iran: ["iran"],
            "ivory coast": ["elfenbenskusten", "cote d ivoire", "côte d ivoire"],
            japan: ["japan"],
            mexico: ["mexiko"],
            morocco: ["marocko"],
            netherlands: ["nederlanderna", "nederländerna", "holland"],
            norway: ["norge"],
            panama: ["panama"],
            paraguay: ["paraguay"],
            portugal: ["portugal"],
            qatar: ["qatar"],
            "saudi arabia": ["saudiarabien", "saudi arabien"],
            scotland: ["skottland"],
            senegal: ["senegal"],
            southkorea: ["sydkorea", "south korea"],
            spain: ["spanien"],
            sweden: ["sverige"],
            switzerland: ["schweiz"],
            tunisia: ["tunisien"],
            turkey: ["turkiet"],
            uruguay: ["uruguay"],
            usa: ["united states", "usa", "forenta staterna", "förenta staterna"],
            uzbekistan: ["uzbekistan"]
        };

        const GROUP_TEAMS = {
            a: ["Mexico", "South Korea", "Czechia", "Czech Republic"],
            b: ["Canada", "Switzerland", "Qatar", "Bosnia and Herzegovina"],
            c: ["Brazil", "Morocco", "Scotland"],
            d: ["USA", "Paraguay", "Australia", "Turkey"],
            e: ["Germany", "Ecuador", "Ivory Coast"],
            f: ["Netherlands", "Japan", "Tunisia", "Sweden"],
            g: ["Belgium", "Iran", "Egypt"],
            h: ["Spain", "Uruguay", "Saudi Arabia"],
            i: ["France", "Senegal", "Norway"],
            j: ["Argentina", "Austria", "Algeria"],
            k: ["Portugal", "Colombia", "Uzbekistan"],
            l: ["England", "Croatia", "Panama", "Ghana"]
        };

        function normalizeSearch(value) {
            return String(value ?? "")
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9]+/g, " ")
                .trim()
                .replace(/\s+/g, " ");
        }

        function aliasTerms(value) {
            const normalized = normalizeSearch(value);
            const compact = normalized.replace(/\s+/g, "");
            const aliases = SEARCH_ALIASES[normalized] || SEARCH_ALIASES[compact] || [];
            return [normalized, compact, ...aliases.map(normalizeSearch)];
        }

        function groupTerms(round) {
            const normalized = normalizeSearch(round);
            const match = normalized.match(/\b(?:group|grupp)\s*([a-l])\b/i);
            if (!match) return [];

            const letter = match[1].toLowerCase();
            return [
                `group ${letter}`,
                `group${letter}`,
                `grupp ${letter}`,
                `grupp${letter}`,
                letter
            ];
        }

        function termsForGroupLetter(letter) {
            return [
                `group ${letter}`,
                `group${letter}`,
                `grupp ${letter}`,
                `grupp${letter}`
            ];
        }

        function teamGroupTerms(teamName) {
            const teamTerms = new Set(aliasTerms(teamName));
            const groups = [];

            Object.entries(GROUP_TEAMS).forEach(([letter, teams]) => {
                const groupHasTeam = teams.some(team => aliasTerms(team).some(term => teamTerms.has(term)));
                if (groupHasTeam) {
                    groups.push(...termsForGroupLetter(letter));
                }
            });

            return groups;
        }

        function searchableText(match) {
            const fields = [
                match.teams.home.name,
                match.teams.away.name,
                match.fixture.venue?.name,
                match.fixture.venue?.city,
                match.league.round,
                match.league.name,
                match.fixture.referee
            ];

            return [
                ...fields.map(normalizeSearch),
                ...aliasTerms(match.teams.home.name),
                ...aliasTerms(match.teams.away.name),
                ...groupTerms(match.league.round),
                ...teamGroupTerms(match.teams.home.name),
                ...teamGroupTerms(match.teams.away.name)
            ].join(" ");
        }

        function updateSummary(matches) {
            const venues = new Set(matches.map(match => match.fixture.venue?.name).filter(Boolean));
            document.getElementById("totalMatches").textContent = matches.length;
            document.getElementById("upcomingMatches").textContent = matches.filter(match => matchState(match) === "upcoming").length;
            document.getElementById("finishedMatches").textContent = matches.filter(match => matchState(match) === "finished").length;
            document.getElementById("venueCount").textContent = venues.size;
        }

        function buildMatchCard(match) {
            const state = matchState(match);
            const home = match.teams.home;
            const away = match.teams.away;
            const fixture = match.fixture;
            const venue = fixture.venue?.name || "Arena saknas";
            const city = fixture.venue?.city || "Stad saknas";
            const referee = fixture.referee || "Domare ej utsedd";
            const elapsed = fixture.status.elapsed ? `${fixture.status.elapsed} min` : "Ej startad";
            const fixtureId = fixture.id;
            const href = `FIFA2026-match-details.html?fixture=${fixtureId}&home=${home.id}&away=${away.id}&back=FIFA2026-matcher-plus.html`;

            return `
                <a class="match-link" href="${href}">
                    <article class="match-card">
                        <div class="match-topline">
                            <span class="badge ${state === "live" ? "live" : state === "finished" ? "done" : ""}">${stateLabel(state)}</span>
                            <span class="badge">${escapeHtml(roundLabel(match))}</span>
                            <span class="kickoff">${escapeHtml(formatDate(fixture.date))}</span>
                        </div>

                        <div class="scoreboard">
                            <div class="team">
                                <div class="team-name">${escapeHtml(home.name)}</div>
                                <small>Hemmalag</small>
                            </div>
                            <div class="score">${scoreValue(match.goals.home)} - ${scoreValue(match.goals.away)}</div>
                            <div class="team away">
                                <div class="team-name">${escapeHtml(away.name)}</div>
                                <small>Bortalag</small>
                            </div>
                        </div>

                        <div class="meta-row">
                            <span>${escapeHtml(venue)}, ${escapeHtml(city)}</span>
                        </div>

                        <div class="fact-grid">
                            <div class="fact"><span>Status</span><strong>${escapeHtml(fixture.status.long || fixture.status.short || "Okänt")}</strong></div>
                            <div class="fact"><span>Spelminut</span><strong>${escapeHtml(elapsed)}</strong></div>
                            <div class="fact"><span>Domare</span><strong>${escapeHtml(referee)}</strong></div>
                            <div class="fact"><span>Match ID</span><strong>${escapeHtml(fixtureId)}</strong></div>
                        </div>
                    </article>
                </a>
            `;
        }

        function groupByDay(matches) {
            return matches.reduce((groups, match) => {
                const key = formatDate(match.fixture.date, { hour: false, year: "numeric" });
                groups[key] = groups[key] || [];
                groups[key].push(match);
                return groups;
            }, {});
        }

        function renderMatches() {
            const container = document.getElementById("matches");
            const search = normalizeSearch(document.getElementById("searchInput").value);
            const statusFilter = document.getElementById("statusFilter").value;
            const sortOrder = document.getElementById("sortOrder").value;

            let matches = allMatches.filter(match => {
                const matchesSearch = !search || searchableText(match).includes(search);
                const matchesStatus = statusFilter === "all" || matchState(match) === statusFilter;
                return matchesSearch && matchesStatus;
            });

            matches = matches.sort((a, b) => {
                const diff = new Date(a.fixture.date) - new Date(b.fixture.date);
                return sortOrder === "desc" ? -diff : diff;
            });

            updateSummary(matches);

            if (!matches.length) {
                container.innerHTML = `<div class="empty">Inga matcher matchar filtret.</div>`;
                return;
            }

            const grouped = groupByDay(matches);
            container.innerHTML = Object.entries(grouped).map(([day, dayMatches]) => `
                <section class="day-group">
                    <div class="day-heading">
                        <h2>${escapeHtml(day)}</h2>
                        <span>${dayMatches.length} matcher</span>
                    </div>
                    <div class="matches">
                        ${dayMatches.map(buildMatchCard).join("")}
                    </div>
                </section>
            `).join("");
        }

        async function loadMatches() {
            const container = document.getElementById("matches");
            const statusBox = document.getElementById("status");

            try {
                const data = await apiFootball(`fixtures?league=${LEAGUE}&season=${SEASON}`);
                allMatches = data.response || [];

                if (!allMatches.length) {
                    container.innerHTML = `<div class="error">Inga matcher hittades för VM 2026.</div>`;
                    statusBox.textContent = "Ingen data hittad.";
                    updateSummary([]);
                    return;
                }

                renderMatches();
                statusBox.textContent = `Visar data för ${allMatches.length} matcher.`;
            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="error">Kunde inte hämta matcher. Kontrollera API-nyckeln och att api-football är tillgängligt.</div>`;
                statusBox.textContent = "Fel vid hämtning av matcher.";
                updateSummary([]);
            }
        }

        document.getElementById("searchInput").addEventListener("input", renderMatches);
        document.getElementById("statusFilter").addEventListener("change", renderMatches);
        document.getElementById("sortOrder").addEventListener("change", renderMatches);

        loadMatches();
    </script>
</body>
</html>
